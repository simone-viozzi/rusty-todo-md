# Coverage is a non-blocking informational signal, not a PR gate.
# Pattern borrowed from rust-analyzer: report numbers, never fail CI,
# never post status comments. The primary correctness signal is the
# test suite — coverage is here so we can see which code paths the
# tests visited, not to enforce a threshold.

coverage:
  status:
    patch: off
    project:
      default:
        informational: true

comment: false
